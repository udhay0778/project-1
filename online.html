<!DOCTYPE html>
<html>
<head>
    <title>College Online Shopping</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>College Online Shopping Website</h1>
    </header>

    <section>
        <h2>Our Products</h2>

        <div class="product">
            <h3>School Bag</h3>
            <p>Price: 400</p>
            <p>Strong and stylish backpack</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <h3>Notebook</h3>
            <p>Price: 45</p>
            <p>200 pages ruled notebook</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <h3>Book file</h3>
            <p>Price: 75</p>
            <p>Round 15 Pages</p>
            <button>Buy Now</button>
        </div>

    </section>

    <section>
        <h2>Order Form</h2>

        <form>
            <label>Full Name:</label>
            <input type="text" required>

            <label>Email:</label>
            <input type="email" required>

            <label>Select Product:</label>
            <select>
                <option>School Bag</option>
                <option>Notebook</option>
                <option>Book files</option>
            </select>

            <label>Quantity:</label>
            <input type="number" min="1">

            <input type="submit" value="Place Order">
        </form>
    </section>

    <footer>
        <p>© 2026 College Online Shopping Website</p>
    </footer>

</body>
</html>
